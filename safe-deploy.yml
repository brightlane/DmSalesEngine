# .github/workflows/safe-deploy.yml - FAIL-SAFE VERSION
name: 🛡️ Safe ManyChat Deploy
on:
  push: [ main ]
  schedule: [ cron: '0 */6 * * *' ]
  workflow_dispatch:

jobs:
  safe-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    # 🆕 AUTO-FIX FILES
    - name: 🛠️ Ensure Files Exist
      run: |
        if [ ! -f package.json ]; then
          echo '{"name":"dmsalesengine","scripts":{"build":"node generator.js"}}' > package.json
        fi
        if [ ! -f generator.js ]; then
          echo "ERROR: generator.js missing" && exit 1
        fi

    - name: 📦 Safe Install
      run: npm ci || npm install
      
    - name: 🔨 Safe Build
      run: node error-handler.js || node generator.js
      
    - name: 🌐 Deploy Anyway
      uses: peaceiris/actions-gh-pages@v3
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist
        commit_message: 'Safe deploy'

    - name: 📊 Status Report
      run: |
        echo "Site: https://brightlane.github.io"
        echo "Pages: $(find dist -name '*.html' 2>/dev/null | wc -l || echo 0)"
