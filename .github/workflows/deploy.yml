# deploy.yml - ULTIMATE PRODUCTION WORKFLOW (Copy-paste to .github/workflows/)
# ✅ MANUAL RUN BUTTON + 4x daily auto + monitoring + notifications

name: 🚀 ManyChat Affiliate Auto Empire

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'  # 12AM,6AM,12PM,6PM auto-rebuilds
  workflow_dispatch:  # 🔴 MANUAL "Run workflow" button

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🟢 Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: 📦 Install & Build Empire
      run: |
        npm ci
        npm run build  # Runs generator.js

    - name: 🌐 Deploy GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist
        user_name: 'github-actions[bot]'
        user_email: '41898282+github-actions[bot]@users.noreply.github.com'

    - name: 🔍 SEO Ping (Google/Bing/IndexNow)
      run: |
        curl "https://www.google.com/ping?sitemap=https://YOURUSERNAME.github.io/sitemap.xml"
        curl "https://www.bing.com/ping?sitemap=https://YOURUSERNAME.github.io/sitemap.xml"
        echo "✅ Search engines notified"

    - name: 📱 Notify Discord (Success)
      if: success()
      uses: 8398a7/action-slack@v3
      with:
        status: success
        fields: repo,message,commit,author,action,eventName,ref,workflow
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    - name: 🚨 Notify Discord (Failure)  
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        fields: repo,message,commit,author,action,eventName,ref,workflow  
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
