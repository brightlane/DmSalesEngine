# .github/workflows/deploy.yml - 100% VALID YAML (Copy-paste EXACTLY)
# Line 3 syntax fix + npm install (no lockfile issues)

name: 🚀 ManyChat Empire Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm

    - name: Install dependencies
      run: npm install

    - name: Build site
      run: npm run build

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist

    - name: SEO ping
      run: |
        echo "✅ Deployed https://brightlane.github.io"
