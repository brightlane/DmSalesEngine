name: 🚀 ManyChat Empire (Lockfile-Free)
on:
  push: [ main ]
  schedule: [ cron: '0 */6 * * *' ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20

    # ✅ NO LOCKFILE NEEDED
    - name: 📦 Install (npm install not ci)
      run: npm install
      
    - name: 🔨 Build Empire
      run: npm run build

    - name: 🌐 Deploy GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist

    - name: 🎉 Live Status
      run: echo "✅ https://brightlane.github.io deployed!"
