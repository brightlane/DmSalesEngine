name: Daily Funnel Build

on:
  schedule:
    - cron: "0 6 * * *"   # runs daily at 6:00 UTC
  workflow_dispatch:      # allows manual run

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # 👉 If you generate pages dynamically, keep this
      - name: Build pages
        run: npm run build || echo "No build step"

      # 👉 If you're just updating timestamps or forcing refresh:
      - name: Touch files (force update)
        run: |
          echo "Last updated: $(date)" >> build-log.txt

      - name: Commit & Push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily auto-build"
            git push
          fi
