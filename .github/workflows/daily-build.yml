name: Daily Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Show files
        run: ls -R

      - name: Run script
        run: node manychat-feeders-daily.js
