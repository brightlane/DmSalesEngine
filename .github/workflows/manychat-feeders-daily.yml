const fs = require("fs");
const path = require("path");

// Example template list (adjust to your real data source)
const templates = [
  "template1",
  "template2",
  "template3"
];

function generateManyChatPages() {
  const outputDir = path.join(__dirname, "manychat");

  if (!fs.existsSync(outputDir)) {
    fs.mkdirSync(outputDir, { recursive: true });
  }

  templates.forEach((template) => {
    // FIXED PATH (this replaces your broken line 131 issue)
    const filePath = `/manychat/gb-${template}-gbp.html`;

    const htmlContent = `
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>ManyChat Page - ${template}</title>
</head>
<body>

  <h1>Generated Page: ${template}</h1>

  <img src="${filePath}" alt="${template}" />

</body>
</html>
`;

    const outputFile = path.join(outputDir, `gb-${template}-gbp.html`);

    fs.writeFileSync(outputFile, htmlContent, "utf8");

    console.log(`Generated: ${outputFile}`);
  });
}

// RUN SCRIPT
generateManyChatPages();
