name: Generate ManyChat Feeders

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate-manychat-feeders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run script
        run: node manychat-global-empire.js
