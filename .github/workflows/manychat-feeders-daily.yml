const today = new Date().toISOString();

console.log("Running at:", today);

// Simulate doing work
function runFeeder() {
  console.log("Processing data...");
  
  // Example data
  const leads = [
    { name: "John", status: "new" },
    { name: "Sarah", status: "follow-up" }
  ];

  leads.forEach(lead => {
    console.log(`Handling lead: ${lead.name} (${lead.status})`);
  });

  console.log("✅ Feeder complete");
}

runFeeder();
