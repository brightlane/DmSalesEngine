name: Generate ManyChat Feeders

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate-manychat-feeders:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Install dependencies (FIX: no lockfile required)
      - name: Install dependencies
        run: npm install

      # 4. Run script
      - name: Run ManyChat Generator
        run: node manychat-global-empire.js
